version: "3.9"

services:
db:
  environment:
    POSTGRES_USER: ${POSTGRES_USER:-cti}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?DB password required}
    POSTGRES_DB: ${POSTGRES_DB:-cti_platform}

backend:
  environment:
    DATABASE_URL: postgresql://${POSTGRES_USER:-cti}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cti_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cti -d cti_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cti:cti_secret@db:5432/cti_platform
      SECRET_KEY: ${SECRET_KEY:?Secret key required — generate with: openssl rand -hex 32}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_MINUTES: 10080
      LOG_LEVEL: INFO
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - uploads_data:/app/data/uploads
      - ./backend/analysis_engine/yara_rules:/app/backend/analysis_engine/yara_rules:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - uploads_data:/app/data/uploads:ro  # nginx can serve download links if needed

volumes:
  postgres_data:
  uploads_data:
